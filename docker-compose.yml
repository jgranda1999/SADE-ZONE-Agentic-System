# Local Redis for decision queue (API + decision_worker).
# Usage: docker compose up -d
# Then: export REDIS_URL=redis://127.0.0.1:6379/0

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
